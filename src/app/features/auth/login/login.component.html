<section class="login" aria-labelledby="login-heading">
  <h1 id="login-heading" class="login__title">Вход</h1>

  <form [formGroup]="form" (ngSubmit)="submit()" class="login__form" novalidate>
    <label class="field">
      <span class="field__label">Email</span>
      <input
        class="field__input"
        type="email"
        formControlName="email"
        autocomplete="email"
        required
      />
      @if (form.controls.email.touched && form.controls.email.invalid) {
        <span class="field__error">Введите корректный email</span>
      }
    </label>

    <label class="field">
      <span class="field__label">Пароль</span>
      <input
        class="field__input"
        type="password"
        formControlName="password"
        autocomplete="current-password"
        minlength="6"
        required
      />
      @if (form.controls.password.touched && form.controls.password.invalid) {
        <span class="field__error">Минимум 6 символов</span>
      }
    </label>

    @if (error(); as err) {
      <p class="login__error" role="alert">{{ err }}</p>
    }

    <button
      tuiButton
      type="submit"
      size="l"
      [disabled]="disabled()"
      [attr.aria-busy]="loading() ? 'true' : null"
    >
      {{ loading() ? 'Входим…' : 'Войти' }}
    </button>

    <button tuiButton type="button" appearance="flat" size="m" (click)="fillDemo()">
      Заполнить демо-данными
    </button>
  </form>

  <p class="login__hint">
    Нет аккаунта? <a routerLink="/auth/register">Зарегистрироваться</a>
  </p>
</section>
