<section class="register" aria-labelledby="register-heading">
  <h1 id="register-heading" class="register__title">Регистрация</h1>

  <form [formGroup]="form" (ngSubmit)="submit()" class="register__form" novalidate>
    <label class="field">
      <span class="field__label">Имя</span>
      <input class="field__input" type="text" formControlName="name" autocomplete="name" required />
      @if (form.controls.name.touched && form.controls.name.invalid) {
        <span class="field__error">Минимум 2 символа</span>
      }
    </label>

    <label class="field">
      <span class="field__label">Email</span>
      <input class="field__input" type="email" formControlName="email" autocomplete="email" required />
      @if (form.controls.email.touched && form.controls.email.invalid) {
        <span class="field__error">Введите корректный email</span>
      }
    </label>

    <label class="field">
      <span class="field__label">Пароль</span>
      <input
        class="field__input"
        type="password"
        formControlName="password"
        autocomplete="new-password"
        minlength="6"
        required
      />
      @if (form.controls.password.touched && form.controls.password.invalid) {
        <span class="field__error">Минимум 6 символов</span>
      }
    </label>

    <label class="field">
      <span class="field__label">Повторите пароль</span>
      <input
        class="field__input"
        type="password"
        formControlName="confirm"
        autocomplete="new-password"
        required
      />
    </label>

    @if (form.errors?.['mismatch'] && form.controls.confirm.touched) {
      <p class="register__error" role="alert">Пароли не совпадают</p>
    }
    @if (error(); as err) {
      <p class="register__error" role="alert">{{ err }}</p>
    }

    <button
      tuiButton
      type="submit"
      size="l"
      [disabled]="disabled()"
      [attr.aria-busy]="loading() ? 'true' : null"
    >
      {{ loading() ? 'Создаём…' : 'Создать аккаунт' }}
    </button>
  </form>

  <p class="register__hint">
    Уже есть аккаунт? <a routerLink="/auth/login">Войти</a>
  </p>
</section>
